[functions]
  directory = "netlify/functions"

# Clean URLs - removes .html from addresses
[build.processing.html]
  pretty_urls = true

# API routes → Netlify Functions
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/prayer"
  to = "/.netlify/functions/prayer"
  status = 200

[[redirects]]
  from = "/api/stay-updated"
  to = "/.netlify/functions/stay-updated"
  status = 200

# Legacy redirects
[[redirects]]
  from = "/donation"
  to = "/"
  status = 301

[[redirects]]
  from = "/coming-soon"
  to = "/"
  status = 301

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers - all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self \"https://give.tithe.ly\")"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://www.google-analytics.com https://*.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://challenges.cloudflare.com; frame-src https://give.tithe.ly https://tithe.ly https://challenges.cloudflare.com; frame-ancestors 'self' https://forgeddigitaldesign.com http://localhost:*; object-src 'none'; base-uri 'self'; form-action 'self'"
    X-XSS-Protection = "1; mode=block"

# Cache static assets - 1 year
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML - short cache with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
