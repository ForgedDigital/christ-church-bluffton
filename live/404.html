    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy-blue: #303b6a;
            --gold: #c3a355;
            --white: #FFFFFF;
            --font-heading: 'Lora', serif;
            --font-body: 'Lora', serif;
            --font-accent: 'Lora', serif;
        }
        html, body { height: 100%; }
        body {
            font-family: var(--font-body);
            background: var(--navy-blue);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 30px;
        }
        .content { max-width: 500px; }
        h1 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 16px;
        }
        p {
            font-family: var(--font-accent);
            font-size: 1.15rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.7;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            padding: 12px 36px;
            border: 2px solid var(--gold);
            border-radius: 50px;
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: var(--gold);
            color: var(--navy-blue);
        }
    </style>
</head>
